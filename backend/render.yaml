services:
  - type: web
    name: quiz-platform-backend
    env: node
    buildCommand: yarn install # or npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 5000
      - key: JWT_SECRET
        generateValue: true
      - key: SESSION_SECRET
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: TURSO_DB_URL
        sync: false
      - key: TURSO_DB_TOKEN
        sync: false
      - key: FRONTEND_URL
        sync: false
